<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta
            name="description"
            content="Quattros full menu - customize your burger, sandwich, or hot dog with toppings, condiments, and choose pickup or delivery. Order online now!"
        />
        <meta name="robots" content="index, follow" />

        <meta
            property="og:title"
            content="Quattros Menu - Customize & Order Online"
        />
        <meta
            property="og:description"
            content="Build your perfect meal with our full menu. Choose pickup, curbside, or delivery."
        />
        <meta property="og:type" content="website" />

        <link
            rel="canonical"
            href="https://www.quattrosamarillo.com/menu.html"
        />
        <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link rel="stylesheet" href="/assets/css/styles.css" />
        <link rel="stylesheet" href="/assets/css/menu-styles.css" />

        <title>Quattros Full Menu | Customize & Order Online</title>
    </head>
    <body>
        <nav class="menu-nav">
            <div class="nav-container">
                <a href="index.html" class="logo">
                    <i class="fas fa-fire"></i>
                    QUATTROS
                </a>
                <a href="index.html" class="back-home-btn">
                    <i class="fas fa-arrow-left"></i>
                    Back to Home
                </a>
            </div>
        </nav>

        <main class="menu-full-page">
            <div class="menu-header-page">
                <h1>🔥 Full Menu</h1>
                <p>
                    Tap any item to customize toppings, add special
                    instructions, and place your order
                </p>
            </div>

            <div class="category-filter">
                <button data-cat="all" class="filter-btn active">
                    All Items
                </button>
                <button data-cat="burgers" class="filter-btn">
                    🍔 Burgers
                </button>
                <button data-cat="sandwiches" class="filter-btn">
                    🥪 Sandwiches
                </button>
                <button data-cat="hotdogs" class="filter-btn">
                    🌭 Hot Dogs
                </button>
                <button data-cat="combos" class="filter-btn">🍟 Combos</button>
                <button data-cat="drinks" class="filter-btn">🥤 Drinks</button>
            </div>

            <div id="menuContainer" class="menu-items-grid"></div>
        </main>

        <!-- Order Modal -->
        <div id="orderModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalItemName">Item Name</h3>
                    <span class="close-modal">&times;</span>
                </div>
                <div class="modal-body">
                    <p class="modal-price" id="modalPrice">$0.00</p>
                    <form id="orderForm">
                        <input type="hidden" id="itemId" />
                        <input type="hidden" id="itemPrice" />

                        <div class="form-group">
                            <label
                                ><i class="fas fa-sliders-h"></i> Customizations
                                (add/remove)</label
                            >
                            <textarea
                                id="customizations"
                                rows="2"
                                placeholder="Examples: no pickles, extra cheese, add bacon, lettuce on side"
                            ></textarea>
                        </div>

                        <div class="form-group">
                            <label
                                ><i class="fas fa-mortar-pestle"></i> Condiments
                                & Extras</label
                            >
                            <input
                                type="text"
                                id="condiments"
                                placeholder="Ketchup, mustard, mayo, BBQ, jalapeños..."
                            />
                        </div>

                        <!-- Inside the modal, replace the Order Type section -->
                         <div class="form-group">
                             <label>📦 Order Type</label>
                             <div class="radio-group">
                                 <label>
                                     <input type="radio" name="orderType" value="Pickup" checked>
                                     Pickup <span style="color: #6c757d; font-size: 0.85rem;">(In-store)</span>
                                 </label>
                                 <label>
                                     <input type="radio" name="orderType" value="Curbside">
                                     Curbside
                                 </label>
                                 <label>
                                     <input type="radio" name="orderType" value="Delivery">
                                     Delivery <span style="color: #e63946; font-size: 0.85rem;">(+$3.99)</span>
                                 </label>
                             </div>
                         </div>

                        <div
                            id="addressGroup"
                            class="form-group"
                            style="display: none"
                        >
                            <label>🏠 Delivery Address</label>
                            <input
                                type="text"
                                id="deliveryAddress"
                                placeholder="Street address, city, zip"
                            />
                        </div>

                        <div class="form-group">
                            <label>⏱️ Pickup/Ready Time</label>
                            <input
                                type="text"
                                id="timeNote"
                                placeholder="ASAP, 6:30 PM, or call when ready"
                            />
                        </div>

                        <div class="form-group">
                            <label>📱 Your Phone</label>
                            <input
                                type="tel"
                                id="customerPhone"
                                required
                                placeholder="(806) 555-1234"
                            />
                        </div>

                        <div class="form-group">
                            <label>👤 Your Name</label>
                            <input
                                type="text"
                                id="customerName"
                                required
                                placeholder="Full name"
                            />
                        </div>

                        <button type="submit" class="btn-submit-order">
                            <i class="fas fa-paper-plane"></i> Send Order to
                            Quattros
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2025 Quattros. All rights reserved. | Amarillo, Texas</p>
        </footer>
        
               <!-- Sticky Action Bar - Premium Liquid Glass -->
               <div class="sticky-action-bar">
               
                   <a href="index.html" class="action-btn" id="homeBtn">
                       <div class="btn-icon">
                           <i class="fas fa-home"></i>
                       </div>
                       <span class="btn-label">Home</span>
                       <div class="btn-glow"></div>
                   </a>
               
                   <a href="tel:+18065551234" class="action-btn" id="callBtn">
                       <div class="btn-icon">
                           <i class="fas fa-phone-alt"></i>
                       </div>
                       <span class="btn-label">Call</span>
                       <div class="btn-glow"></div>
                   </a>
                   
                   <a href="menu.html" class="action-btn" id="menuBtn">
                       <div class="btn-icon">
                           <i class="fas fa-utensils"></i>
                       </div>
                       <span class="btn-label">Menu</span>
                       <div class="btn-glow"></div>
                   </a>
                   
                   <a href="https://maps.google.com/?q=Amarillo+TX" target="_blank" class="action-btn" id="directionsBtn">
                       <div class="btn-icon">
                           <i class="fas fa-directions"></i>
                       </div>
                       <span class="btn-label">Directions</span>
                       <div class="btn-glow"></div>
                   </a>
               
               </div>
        <script src="/assets/js/menu-scripts.js"></script>
    </body>
</html>
